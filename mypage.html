<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 · Nexus Alpha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="css/account.css">
</head>
<body>
    <div class="account-shell">
        <div class="account-header">
            <div>
                <h1>마이페이지</h1>
                <div class="sub" id="subLine">로그인 정보를 불러오는 중…</div>
            </div>
            <div class="header-actions">
                <a class="btn-link" href="index.html">← 홈으로</a>
                <a class="btn-link" href="pricing.html">요금제</a>
                <!-- 마스터 판정 후 JS 가 hidden 속성을 제거 (auth.css 의 [hidden]{display:none !important} 적용) -->
                <a class="btn-primary" href="admin.html" id="adminLink" hidden>👑 관리자 대시보드</a>
                <button class="btn-link" id="logoutBtn">로그아웃</button>
            </div>
        </div>

        <div id="errorBanner" class="error-banner" style="display:none;"></div>

        <div class="account-grid">
            <div class="account-card">
                <h3>구독 현황</h3>
                <div id="subscriptionBox">불러오는 중…</div>
            </div>

            <div class="account-card">
                <h3>이번 달 사용량</h3>
                <div id="usageBox">불러오는 중…</div>
            </div>

            <div class="account-card">
                <h3>🔒 비밀번호 변경</h3>
                <form id="pwChangeForm" autocomplete="off" novalidate>
                    <div class="pw-field">
                        <label for="pwCurrent">현재 비밀번호</label>
                        <div class="pw-input-wrap">
                            <input type="password" id="pwCurrent" name="pw_current_x7k" required autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                            <button type="button" class="pw-toggle" data-target="pwCurrent" aria-label="표시/숨김">👁</button>
                        </div>
                    </div>
                    <div class="pw-field">
                        <label for="pwNew">새 비밀번호 (8자+, 영문+숫자)</label>
                        <div class="pw-input-wrap">
                            <input type="password" id="pwNew" name="pw_new_x7k" required minlength="8" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                            <button type="button" class="pw-toggle" data-target="pwNew" aria-label="표시/숨김">👁</button>
                        </div>
                    </div>
                    <div class="pw-field">
                        <label for="pwNewConfirm">새 비밀번호 확인</label>
                        <div class="pw-input-wrap">
                            <input type="password" id="pwNewConfirm" name="pw_confirm_x7k" required minlength="8" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
                            <button type="button" class="pw-toggle" data-target="pwNewConfirm" aria-label="표시/숨김">👁</button>
                        </div>
                    </div>
                    <div id="pwMessage" class="pw-message" hidden></div>
                    <button type="submit" class="btn-primary" id="pwSubmitBtn" style="width:100%;">비밀번호 변경</button>
                </form>
            </div>

            <div class="account-card">
                <h3>AI API 키 (BYOK)</h3>
                <p class="notice">본인 API 키를 등록하면 서버 쿼터와 무관하게 AI 분석을 무제한 호출할 수 있습니다. 현재는 홈 화면 상단의 <strong>AI 키 설정</strong> 버튼으로 브라우저에 저장됩니다.<br><br>(Phase 4 에서 서버 측 암호화 저장으로 업그레이드 예정)</p>
            </div>

            <div class="account-card">
                <h3>결제 내역</h3>
                <p class="notice">Phase 3 결제 연동 후 이 영역에 실제 결제 내역이 표시됩니다.</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const fmt = (iso) => iso ? new Date(iso).toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }) : '—';
        const showError = (msg) => {
            const b = document.getElementById('errorBanner');
            b.textContent = msg;
            b.style.display = '';
        };

        async function gateOrRedirect() {
            const s = await NexusAuth.getDevStatus();
            if (s.dev_mode) return s.fake_user;
            if (!NexusAuth.getAccessToken()) {
                location.replace('login.html?next=mypage.html');
                throw new Error('no auth');
            }
            return NexusAuth.getUser();
        }

        function renderSubscription(sub, user) {
            const box = document.getElementById('subscriptionBox');
            const master = sub.is_master ? ' <span style="color:#facc15;">👑 마스터</span>' : '';
            box.innerHTML = `
                <div class="kv-row"><span class="k">이메일</span><span class="v">${user.email || '—'}</span></div>
                <div class="kv-row"><span class="k">현재 플랜</span><span class="v">${sub.label || sub.plan}${master}</span></div>
                <div class="kv-row"><span class="k">상태</span><span class="v">${sub.status || '—'}</span></div>
                <div class="kv-row"><span class="k">결제 주기</span><span class="v">${sub.billing_cycle || '—'}</span></div>
                <div class="kv-row"><span class="k">시작일</span><span class="v">${fmt(sub.started_at)}</span></div>
                <div class="kv-row"><span class="k">만료일</span><span class="v">${fmt(sub.expires_at)}</span></div>
                <div style="margin-top:16px;">
                    <a class="btn-primary" href="pricing.html">플랜 변경</a>
                </div>
            `;
        }

        function renderUsage(u) {
            const box = document.getElementById('usageBox');
            const bar = (used, limit) => {
                if (limit === -1) {
                    return `<div class="usage-bar"><div class="fill unlimited" style="width:100%;"></div></div>`;
                }
                if (limit === 0) {
                    return `<div class="usage-bar"><div class="fill over" style="width:100%;"></div></div>`;
                }
                const pct = Math.min(100, Math.round((used / limit) * 100));
                const over = used >= limit;
                return `<div class="usage-bar"><div class="fill ${over ? 'over' : ''}" style="width:${pct}%;"></div></div>`;
            };
            const label = (used, limit) => {
                if (limit === -1) return '무제한';
                if (limit === 0) return '이용 불가 (업그레이드 필요)';
                return `${used} / ${limit}`;
            };

            box.innerHTML = `
                <div class="usage-row">
                    <div class="usage-label"><span class="k">AI 분석</span><span class="v">${label(u.ai_analysis.used, u.ai_analysis.limit)}</span></div>
                    ${bar(u.ai_analysis.used, u.ai_analysis.limit)}
                </div>
                <div class="usage-row">
                    <div class="usage-label"><span class="k">투자자 패널 토론</span><span class="v">${label(u.panel_discuss.used, u.panel_discuss.limit)}</span></div>
                    ${bar(u.panel_discuss.used, u.panel_discuss.limit)}
                </div>
                <p class="notice" style="margin-top:16px;">쿼터는 매월 1일 UTC 기준으로 초기화됩니다. 본인 API 키(BYOK)로 호출한 AI 분석은 서버 쿼터에서 차감되지 않습니다.</p>
            `;
        }

        (async function () {
            try {
                let user = await gateOrRedirect();

                // 🆕 localStorage 의 옛 user 객체에 is_master 필드가 누락됐을 수 있어
                //    서버의 fresh /api/auth/me 응답으로 동기화 (DEV_MODE 가 아닐 때만)
                try {
                    const dev = await NexusAuth.getDevStatus();
                    if (!dev.dev_mode && NexusAuth.getAccessToken()) {
                        const fresh = await NexusAuth.apiFetch('/api/auth/me', { auth: true });
                        if (fresh && typeof fresh === 'object') {
                            user = fresh;
                            // localStorage 갱신 (access/refresh 는 그대로, user 만 업데이트)
                            NexusAuth.saveTokens(null, null, fresh);
                        }
                    }
                } catch (e) {
                    console.warn('[mypage] /api/auth/me 동기화 실패 — localStorage user 사용:', e.message);
                }

                document.getElementById('subLine').textContent = user.email || '';

                const [sub, usage] = await Promise.all([
                    NexusAuth.apiFetch('/api/subscription/me', { auth: true }),
                    NexusAuth.apiFetch('/api/subscription/usage', { auth: true }),
                ]);
                renderSubscription(sub, user);
                renderUsage(usage);

                // 마스터 계정이면 관리자 대시보드 버튼 노출
                // (DEV_MODE fake_user.is_master / 실제 user.is_master / sub.is_master 중 하나라도 true)
                const isMaster = !!(user && user.is_master) || !!(sub && sub.is_master);
                console.log('[mypage] 마스터 판정:', {
                    'user.is_master': user && user.is_master,
                    'sub.is_master':  sub  && sub.is_master,
                    final: isMaster,
                });
                const adminBtn = document.getElementById('adminLink');
                if (adminBtn) {
                    if (isMaster) {
                        adminBtn.removeAttribute('hidden');
                        adminBtn.style.removeProperty('display');  // 옛 inline display:none 잔재 제거
                    } else {
                        adminBtn.setAttribute('hidden', '');
                    }
                }
            } catch (e) {
                if (e.message !== 'no auth') {
                    showError('정보를 불러오지 못했습니다: ' + e.message);
                }
            }
        })();

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await NexusAuth.logout();
            location.replace('login.html');
        });

        // ──────────────────────────────────────────
        // 비밀번호 변경 (셀프 서비스)
        // ──────────────────────────────────────────
        // 토글 (👁 / 🙈) 바인딩 — 3개 input 공용
        document.querySelectorAll('.pw-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                if (!target) return;
                if (target.type === 'password') {
                    target.type = 'text';
                    btn.textContent = '🙈';
                } else {
                    target.type = 'password';
                    btn.textContent = '👁';
                }
            });
        });

        function _showPwMessage(text, kind) {
            const el = document.getElementById('pwMessage');
            el.textContent = text;
            el.className = 'pw-message ' + (kind || '');
            el.hidden = false;
        }

        document.getElementById('pwChangeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cur = document.getElementById('pwCurrent').value;
            const nw  = document.getElementById('pwNew').value;
            const conf= document.getElementById('pwNewConfirm').value;
            const submitBtn = document.getElementById('pwSubmitBtn');

            // 클라이언트 측 1차 검증
            if (!cur || !nw || !conf) {
                _showPwMessage('모든 항목을 입력하세요.', 'err');
                return;
            }
            if (nw !== conf) {
                _showPwMessage('새 비밀번호 두 입력이 다릅니다.', 'err');
                return;
            }
            if (!/^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(nw)) {
                _showPwMessage('새 비밀번호는 최소 8자 + 영문 + 숫자를 포함해야 합니다.', 'err');
                return;
            }
            if (cur === nw) {
                _showPwMessage('새 비밀번호가 현재 비밀번호와 같습니다.', 'err');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '변경 중…';
            try {
                const r = await NexusAuth.apiFetch('/api/auth/password', {
                    method: 'POST',
                    auth: true,
                    body: { current_password: cur, new_password: nw },
                });
                _showPwMessage('✅ ' + (r.message || '비밀번호가 변경되었습니다.'), 'ok');
                // 폼 초기화 (보안)
                document.getElementById('pwChangeForm').reset();
                document.querySelectorAll('.pw-toggle').forEach(b => b.textContent = '👁');
                document.querySelectorAll('.pw-input-wrap input').forEach(i => i.type = 'password');
            } catch (err) {
                _showPwMessage('❌ ' + (err.message || '변경 실패'), 'err');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '비밀번호 변경';
            }
        });
    </script>
</body>
</html>
