<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — Nexus Alpha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/theme.js"></script>
    <style>
        /* 비밀번호 입력창 눈 아이콘 토글 (auth-card 안 — 토큰 --auth-* 사용) */
        .pw-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pw-input-wrap input {
            flex: 1;
            width: 100%;
            padding-right: 42px;   /* 우측 버튼 공간 */
        }
        .pw-toggle {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 0;
            color: var(--auth-muted, #94a3b8);
            font-size: 16px;
            line-height: 1;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.15s, color 0.15s;
        }
        .pw-toggle:hover {
            background: rgba(148, 163, 184, 0.15);
            color: var(--auth-text, #e2e8f0);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" type="button"></button>
    <main class="auth-shell">
        <div class="auth-card">
            <header class="auth-card__header">
                <h1>Nexus Alpha</h1>
                <p>새 계정을 만드세요</p>
            </header>

            <form id="signupForm" class="auth-form" novalidate autocomplete="off">
                <label class="auth-field">
                    <span>이메일</span>
                    <input type="email" name="email" required autocomplete="email" placeholder="name@example.com">
                </label>

                <label class="auth-field">
                    <span>이름</span>
                    <input type="text" name="name" required minlength="1" maxlength="100" autocomplete="name" placeholder="홍길동">
                </label>

                <label class="auth-field">
                    <span>비밀번호</span>
                    <div class="pw-input-wrap">
                        <!--
                          크롬 비밀번호 자동완성·추천 팝업 억제 트릭 (mypage 비밀번호 변경창과 동일 패턴):
                            1. autocomplete="off" — 크롬 "강력한 비밀번호 추천" 팝업까지 억제
                                (autocomplete="new-password" 는 오히려 추천 팝업 유발)
                            2. name 비표준화 (pw_signup_x7k) — 비밀번호 매니저 매칭 회피
                            3. readonly + onfocus="removeAttribute" — 페이지 로드 시 비활성 → 포커스 시 활성화로 자동완성 트리거 회피
                            4. data-1p-ignore / data-lpignore — 1Password / LastPass 등 매니저 무시 신호
                            5. form autocomplete="off" 도 함께 적용 (위)
                        -->
                        <input type="password" id="signupPw" name="pw_signup_x7k" required minlength="8" maxlength="128" autocomplete="off" data-1p-ignore="true" data-lpignore="true" placeholder="최소 8자, 문자+숫자 포함" readonly onfocus="this.removeAttribute('readonly')">
                        <button type="button" class="pw-toggle" data-target="signupPw" aria-label="비밀번호 표시/숨김" title="비밀번호 표시/숨김">👁</button>
                    </div>
                </label>

                <label class="auth-field">
                    <span>비밀번호 확인</span>
                    <div class="pw-input-wrap">
                        <input type="password" id="signupPw2" name="pw_signup_confirm_x7k" required minlength="8" maxlength="128" autocomplete="off" data-1p-ignore="true" data-lpignore="true" readonly onfocus="this.removeAttribute('readonly')">
                        <button type="button" class="pw-toggle" data-target="signupPw2" aria-label="비밀번호 표시/숨김" title="비밀번호 표시/숨김">👁</button>
                    </div>
                </label>

                <label class="auth-field">
                    <span>휴대폰 (선택)</span>
                    <input type="tel" name="phone" maxlength="20" autocomplete="tel" placeholder="010-1234-5678">
                </label>

                <div id="signupError" class="auth-error" hidden></div>

                <button type="submit" class="auth-btn auth-btn--primary">가입하기</button>
                <p class="auth-consent" style="margin:12px 0 0; font-size:11px; color:var(--auth-muted); text-align:center; line-height:1.5;">
                    가입 시 <a href="terms.html" style="color:var(--auth-accent); text-decoration:none;">이용약관</a>,
                    <a href="privacy.html" style="color:var(--auth-accent); text-decoration:none;">개인정보 처리방침</a>
                    및 <a href="refund.html" style="color:var(--auth-accent); text-decoration:none;">환불정책</a>에 동의합니다.
                </p>
            </form>

            <footer class="auth-card__footer">
                <p>이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
                <p><a href="index.html" class="auth-link-muted">← 메인으로 돌아가기</a></p>
            </footer>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script>
        // 이미 로그인된 상태면 메인으로
        if (NexusAuth.getAccessToken()) {
            window.location.replace('index.html');
        }
        NexusAuth.installDevBannerIfNeeded();

        // 비밀번호 표시/숨김 토글 (👁 / 🙈)
        document.querySelectorAll('.pw-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                if (!target) return;
                if (target.type === 'password') {
                    target.type = 'text';
                    btn.textContent = '🙈';
                } else {
                    target.type = 'password';
                    btn.textContent = '👁';
                }
            });
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('signupError');
            err.hidden = true;
            err.textContent = '';

            const fd = new FormData(e.target);
            // 비밀번호는 비표준화된 name 으로 (자동완성 회피용) — id 로 직접 조회
            const pw1 = document.getElementById('signupPw').value;
            const pw2 = document.getElementById('signupPw2').value;
            if (pw1 !== pw2) {
                err.textContent = '비밀번호 확인이 일치하지 않습니다.';
                err.hidden = false;
                return;
            }

            const payload = {
                email: fd.get('email').trim(),
                password: pw1,
                name: fd.get('name').trim(),
            };
            const phone = (fd.get('phone') || '').toString().trim();
            if (phone) payload.phone = phone;

            try {
                await NexusAuth.signup(payload);
                window.location.replace('index.html');
            } catch (e2) {
                err.textContent = e2.message || '회원가입 실패';
                err.hidden = false;
            }
        });
    </script>
</body>
</html>
